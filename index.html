<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Візитівка - Станіслав Добрун</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; color: white; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 8px; border: 1px solid #00ffcc; }
        #startButton { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; padding: 15px 30px; background-color: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        #startButton:hover { background-color: #00ccaa; }
        video { display: none; } 
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
            }
        }
    </script>
</head>
<body>
    <div id="ui">
        <strong>AR Візитівка</strong><br>
        Станіслав Добрун | Група І-22<br>
        <em>Наведіть на маркер та натискайте на кнопки</em>
    </div>
    
    <video id="portfolioVideo" src="https://threejs.org/examples/textures/sintel.mp4" loop crossorigin="anonymous" playsinline muted></video>
    
    <button id="startButton">Увімкнути AR-камеру</button>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';

        // Генератор кнопок (щоб не залежати від картинок)
        function createTextButton(text, bgColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.roundRect(0, 0, 512, 128, 40);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 50px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 64);
            return new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true });
        }

        const mindarThree = new MindARThree({
            container: document.querySelector("#container"),
            imageTargetSrc: "targets.mind",
            maxTrack: 1 
        });
        const {renderer, scene, camera} = mindarThree;
        const anchor = mindarThree.addAnchor(0); 

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // === 1. АВАТАРКА (Публічна текстура) ===
        const textureLoader = new THREE.TextureLoader();
        // Використовуємо надійну текстуру з сервера Three.js
        const avatarMaterial = new THREE.MeshBasicMaterial({ 
            map: textureLoader.load('https://threejs.org/examples/textures/crate.gif') 
        });
        const avatarMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.05, 32), avatarMaterial);
        avatarMesh.rotation.x = Math.PI / 2;
        avatarMesh.position.set(0, 0.4, 0);
        anchor.group.add(avatarMesh);

        // === 2. КНОПКИ ===
        const btnGeo = new THREE.PlaneGeometry(0.8, 0.2);
        
        const btnInfo = new THREE.Mesh(btnGeo, createTextButton('👨‍💻 ПРОФІЛЬ', '#9c27b0'));
        btnInfo.position.set(0, 0, 0);
        anchor.group.add(btnInfo);

        const btnVideo = new THREE.Mesh(btnGeo, createTextButton('▶ ПОРТФОЛІО', '#2196f3'));
        btnVideo.position.set(0, -0.25, 0);
        anchor.group.add(btnVideo);

        const btnLink = new THREE.Mesh(btnGeo, createTextButton('🔗 УНІВЕРСИТЕТ', '#4caf50'));
        btnLink.position.set(0, -0.5, 0);
        anchor.group.add(btnLink);

        // === 3. ПРИХОВАНИЙ КОНТЕНТ ===
        const infoPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(1, 0.6), 
            createTextButton('Розробник AR \n КДПУ', '#333333')
        );
        infoPlane.position.set(-0.9, 0, 0);
        infoPlane.visible = false; 
        anchor.group.add(infoPlane);

        const video = document.getElementById('portfolioVideo');
        const videoPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.5625), new THREE.MeshBasicMaterial({ map: new THREE.VideoTexture(video) }));
        videoPlane.position.set(0.9, 0, 0);
        videoPlane.visible = false; 
        anchor.group.add(videoPlane);

        // === 4. ВЗАЄМОДІЯ ===
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (!anchor.group.visible) return; 

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(anchor.group.children, false);
            
            if (intersects.length > 0) {
                const object = intersects[0].object;

                if (object === btnInfo) {
                    infoPlane.visible = !infoPlane.visible; 
                }
                else if (object === btnVideo) {
                    videoPlane.visible = !videoPlane.visible;
                    if (videoPlane.visible) video.play().catch(()=>{});
                    else video.pause();
                }
                else if (object === btnLink) {
                    window.open('https://kdpu.edu.ua/', '_blank');
                }
            }
        });

        const clock = new THREE.Clock();

        const startButton = document.querySelector("#startButton");
        startButton.addEventListener("click", async () => {
            startButton.style.display = "none";
            
            try { let p = video.play(); if (p !== undefined) p.then(() => video.pause()).catch(() => {}); } catch(e){}
            
            await mindarThree.start();
            
            renderer.setAnimationLoop(() => {
                const time = clock.getElapsedTime();
                avatarMesh.rotation.z -= 0.02; // Аватар крутиться
                
                // Кнопки "дихають"
                const scale = 1 + Math.sin(time * 3) * 0.02;
                btnInfo.scale.set(scale, scale, scale);
                btnVideo.scale.set(scale, scale, scale);
                btnLink.scale.set(scale, scale, scale);

                renderer.render(scene, camera);
            });
        });
    </script>
</body>
</html>
